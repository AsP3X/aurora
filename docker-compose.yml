services:
  init-env:
    image: alpine:latest
    container_name: aurora-init-env
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: >
      sh -c "tr -d '\r' < /workspace/init-env.sh > /tmp/init-env.sh && sh /tmp/init-env.sh"
    profiles:
      - init

  postgres:
    image: postgres:16-alpine
    container_name: aurora-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aurora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurora}
      POSTGRES_DB: ${POSTGRES_DB:-aurora}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: aurora-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aurora-master-key}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  object-storage:
    build:
      context: ./nebula-os
      dockerfile: Dockerfile
    container_name: aurora-object-storage
    environment:
      # Human: Optional at compose-parse time so `docker compose down` works without .env; Nebula validates on start.
      # Agent: READS .env via compose interpolation; FAILS at container start if unset/weak (nebula-os secrets.rs).
      NOS_JWT_SECRET: ${NOS_JWT_SECRET:-}
      NOS_SIGNING_SECRET: ${NOS_SIGNING_SECRET:-}
      NOS_BIND_ADDR: 0.0.0.0:9000
      NOS_DATA_DIR: /data/blobs
      NOS_META_PATH: /data/meta/metadata.db
      RUST_LOG: info
    ports:
      - "9000:9000"
    volumes:
      - nebula_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: aurora-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://aurora:aurora@postgres:5432/aurora}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-aurora-master-key}
      JWT_SECRET: ${JWT_SECRET:-}
      OBJECT_STORAGE_JWT_SECRET: ${NOS_JWT_SECRET:-}
      SIGNING_SECRET: ${SIGNING_SECRET:-}
      MASTER_SECRET: ${MASTER_SECRET:-}
      URL_EXPIRY_SECONDS: ${URL_EXPIRY_SECONDS:-3600}
      MUSIC_DIR: ${MUSIC_DIR:-/music}
      STORAGE_MODE: ${STORAGE_MODE:-proxy}
      OBJECT_STORAGE_URL: ${OBJECT_STORAGE_URL:-http://object-storage:9000}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:9000}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-music}
      RUST_LOG: ${RUST_LOG:-info}
      BIND_ADDR: ${BIND_ADDR:-0.0.0.0:3000}
      AURORA_ENVIRONMENT: ${AURORA_ENVIRONMENT:-development}
      GIT_SHA: ${GIT_SHA:-unknown}
      ADMIN_LISTENING_RPM: ${ADMIN_LISTENING_RPM:-120}
      AUTH_LOGIN_RPM: ${AUTH_LOGIN_RPM:-15}
      AUTH_REGISTER_RPM: ${AUTH_REGISTER_RPM:-5}
      UPLOAD_RPM: ${UPLOAD_RPM:-20}
      HLS_SEGMENT_RPM: ${HLS_SEGMENT_RPM:-480}
    ports:
      - "3000:3000"
    volumes:
      - ./music:/music
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      object-storage:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aurora-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  meilisearch_data:
  nebula_data:
