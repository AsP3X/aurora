<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Inter specimen</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { height: 220px; }
  .top { display: flex; align-items: flex-end; gap: 14px; }
  .big { font: 800 108px/0.9 Inter; letter-spacing: -0.05em; color: #fff; }
  .stack { display: flex; flex-direction: column; gap: 4px; padding-bottom: 10px; }
  .stack .l { font: 600 11px/1 Inter; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); }
  .stack .n { font: 600 16px/1.2 Inter; color: #e8e6f0; }
  .weights { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 18px; }
  .w { padding: 8px 10px; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
  .w .v { font-size: 22px; color: #fff; line-height: 1; }
  .w .l { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-faint); margin-top: 6px;}
</style></head>
<body>
  <div class="top">
    <div class="big">Aa</div>
    <div class="stack">
      <div class="l">Family</div>
      <div class="n">Inter (Variable)</div>
      <div class="l" style="margin-top:8px">Source</div>
      <div class="n">fonts.google.com</div>
    </div>
  </div>
  <div class="weights">
    <div class="w"><div class="v" style="font-weight:300">Aa</div><div class="l">300 Light</div></div>
    <div class="w"><div class="v" style="font-weight:400">Aa</div><div class="l">400 Regular</div></div>
    <div class="w"><div class="v" style="font-weight:500">Aa</div><div class="l">500 Medium</div></div>
    <div class="w"><div class="v" style="font-weight:600">Aa</div><div class="l">600 Semibold</div></div>
    <div class="w"><div class="v" style="font-weight:700">Aa</div><div class="l">700 Bold</div></div>
    <div class="w"><div class="v" style="font-weight:800">Aa</div><div class="l">800 Extrabold</div></div>
  </div>
</body></html>
