name: Database migrations

on:
  push:
    branches: [master]
  pull_request:

jobs:
  sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply SQLite migrations (test)
        run: cargo test sqlite_migrations_apply_cleanly -- --nocapture

  postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aurora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply Postgres migrations (test)
        env:
          POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/aurora_test
        run: cargo test postgres_migrations_apply_cleanly -- --nocapture
