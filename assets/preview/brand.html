<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Brand</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { width: 700px; height: 300px; padding: 0; position: relative; overflow: hidden;
         background: radial-gradient(ellipse 600px 380px at 18% 50%, rgba(124,58,237,0.22), transparent 65%), var(--surface-950); }
  .grid { display: grid; grid-template-columns: 240px 1fr; height: 100%; }

  /* ─ Logo cell ─ */
  .logo-cell { display: grid; place-items: center; border-right: 1px solid rgba(255,255,255,0.06); position: relative; }
  .logo-cell::after { content: ""; position: absolute; right: 0; top: 20%; bottom: 20%; width: 1px;
                      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.10), transparent); }
  .logo {
    width: 132px; height: 132px;
    filter: drop-shadow(0 12px 30px rgba(139,92,246,0.55)) drop-shadow(0 0 18px rgba(167,139,250,0.30));
  }

  /* ─ Right column ─ */
  .right { padding: 32px 32px 28px; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
  .eyebrow { font-size: 10.5px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--aurora-300); }
  .wordmark { font-weight: 800; font-size: 64px; letter-spacing: -0.045em; color: #fff; line-height: 0.95; margin: 0; }
  .tagline { font-size: 13px; color: var(--fg-dim); line-height: 1.55; max-width: 380px; margin: 0; }
  .tagline b { color: #fff; font-weight: 600; }

  .swatches { display: flex; gap: 6px; margin-top: 4px; }
  .sw { width: 24px; height: 24px; border-radius: 6px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
  .sw-label { font-size: 10px; font-family: ui-monospace, Menlo, monospace; color: var(--fg-faint); margin-left: 8px; align-self: center; letter-spacing: 0.04em; }

  /* corner marks for that 'spec sheet' feel */
  .corner { position: absolute; width: 12px; height: 12px; border: 1px solid rgba(255,255,255,0.10); }
  .corner.tl { top: 14px; left: 14px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 14px; right: 14px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }
</style></head>
<body>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="grid">
    <div class="logo-cell">
      <img class="logo" src="../assets/aurora-mark.svg" alt="Aurora logo">
    </div>
    <div class="right">
      <div class="eyebrow">Primary mark · app icon · favicon</div>
      <h1 class="wordmark">Aurora</h1>
      <p class="tagline"><b>A seven-bar equalizer waveform</b> &mdash; sound made visible. The peak bar shifts violet&nbsp;&rarr;&nbsp;rose to signal the leading note. Pair the mark with the Inter wordmark only.</p>
      <div style="display: flex; align-items: center;">
        <div class="swatches">
          <div class="sw" style="background:#C4B5FD"></div>
          <div class="sw" style="background:#8B5CF6"></div>
          <div class="sw" style="background:#6D28D9"></div>
          <div class="sw" style="background:#DB2777"></div>
          <div class="sw" style="background:#0F0E14"></div>
        </div>
        <span class="sw-label">aurora-300 · 500 · 700 · rose · ink</span>
      </div>
    </div>
  </div>
</body></html>
