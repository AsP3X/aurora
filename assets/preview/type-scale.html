<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Type scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { height: 360px; }
  .row { display: grid; grid-template-columns: 80px 1fr auto; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
  .row:last-child { border-bottom: 0; }
  .tag  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg-faint); letter-spacing: 0.06em; padding-top: 4px;}
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg-dim); }
  .display { font: 800 36px/1.1 Inter; letter-spacing: -0.02em; color: #fff; }
  .h1      { font: 700 30px/1.15 Inter; letter-spacing: -0.02em; color: #fff; }
  .h2      { font: 600 24px/1.2 Inter; letter-spacing: -0.015em; color: #fff; }
  .h3      { font: 600 18px/1.3 Inter; color: #fff; }
  .body    { font: 400 14px/1.55 Inter; color: #e8e6f0; }
  .meta-t  { font: 400 12px/1.5 Inter; color: var(--fg-dim); }
  .eyebrow { font: 600 11px/1 Inter; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); }
</style></head>
<body>
  <div class="row"><span class="tag">DISPLAY</span><span class="display">Aurora Music</span><span class="meta">800 · 36 / 40</span></div>
  <div class="row"><span class="tag">H1</span><span class="h1">Recently Added</span><span class="meta">700 · 30 / 35</span></div>
  <div class="row"><span class="tag">H2</span><span class="h2">Your Playlists</span><span class="meta">600 · 24 / 29</span></div>
  <div class="row"><span class="tag">H3</span><span class="h3">Quick Actions</span><span class="meta">600 · 18 / 23</span></div>
  <div class="row"><span class="tag">BODY</span><span class="body">Stream your library from anywhere.</span><span class="meta">400 · 14 / 22</span></div>
  <div class="row"><span class="tag">META</span><span class="meta-t">12,341 plays · last 30 days</span><span class="meta">400 · 12 / 18</span></div>
  <div class="row"><span class="tag">EYEBROW</span><span class="eyebrow">TOTAL SONGS</span><span class="meta">600 · 11 · +0.12em</span></div>
</body></html>
