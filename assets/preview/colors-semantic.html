<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Semantic colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { height: 220px; }
  h4 { margin: 0 0 14px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); font-weight: 600;}
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .chip { border-radius: 12px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 1px solid; font-size: 12.5px; font-weight: 500; }
  .chip .d { width: 8px; height: 8px; border-radius: 999px; }
  .ok    { background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.25); color: #34d399; }
  .ok .d { background: #34d399; box-shadow: 0 0 8px #34d399; }
  .warn  { background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.25); color: #fbbf24; }
  .warn .d { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
  .err   { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.25); color: #f87171; }
  .err .d { background: #f87171; box-shadow: 0 0 8px #f87171; }
  .info  { background: rgba(14,165,233,0.10); border-color: rgba(14,165,233,0.25); color: #38bdf8; }
  .info .d { background: #38bdf8; box-shadow: 0 0 8px #38bdf8; }
  .tile-row { margin-top: 14px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .tile { border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; }
  .tile .ico { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; }
  .tile .ico svg { width: 18px; height: 18px; }
  .tile .l { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-dim); font-weight: 600; }
  .tile .v { font-size: 18px; font-weight: 700; color: #fff; line-height: 1; margin-top: 2px; }
  .tile.a { background: #1a1822; border: 1px solid rgba(255,255,255,0.05); }
  .ico.aurora { background: rgba(124,58,237,0.20); color: #a78bfa; }
  .ico.rose   { background: rgba(244,63,94,0.20);  color: #fb7185; }
  .ico.amber  { background: rgba(245,158,11,0.20); color: #fbbf24; }
  .ico.emer   { background: rgba(16,185,129,0.20); color: #34d399; }
</style></head>
<body>
  <h4>Semantic colors — status + stat-icon tints</h4>
  <div class="grid">
    <div class="chip ok"><span class="d"></span>Success</div>
    <div class="chip warn"><span class="d"></span>Warning</div>
    <div class="chip err"><span class="d"></span>Danger</div>
    <div class="chip info"><span class="d"></span>Info</div>
  </div>
  <div class="tile-row">
    <div class="tile a"><div class="ico aurora"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/></svg></div><div><div class="l">Songs</div><div class="v">14,201</div></div></div>
    <div class="tile a"><div class="ico rose"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div><div><div class="l">Artists</div><div class="v">823</div></div></div>
    <div class="tile a"><div class="ico amber"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div><div><div class="l">Albums</div><div class="v">1,432</div></div></div>
    <div class="tile a"><div class="ico emer"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div><div class="l">Duration</div><div class="v">802h</div></div></div>
  </div>
</body></html>
