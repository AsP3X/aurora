<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Primary palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { height: 200px; }
  h4 { margin: 0 0 14px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); font-weight: 600;}
  .scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.1/1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end; font-family: ui-monospace, Menlo, monospace; font-size: 9.5px; color: rgba(255,255,255,0.85); position: relative; }
  .sw .n { font-weight: 700; font-size: 10.5px; color: #fff; }
  .sw .h { opacity: 0.7; }
  .sw.dark .n, .sw.dark .h { color: #fff; }
  .sw.lite .n, .sw.lite .h { color: #1c1626; }
  .key { position: absolute; top: 6px; right: 8px; font-size: 8.5px; opacity: 0.7; letter-spacing: 0.04em; }
  .star { position: absolute; top: 6px; right: 8px; font-size: 10px; color: #fff; }
</style></head>
<body>
  <h4>Aurora — primary purple</h4>
  <div class="scale">
    <div class="sw lite" style="background:#f5f3ff"><span class="key">50</span><span class="n">50</span><span class="h">#F5F3FF</span></div>
    <div class="sw lite" style="background:#ede9fe"><span class="key">100</span><span class="n">100</span><span class="h">#EDE9FE</span></div>
    <div class="sw lite" style="background:#ddd6fe"><span class="key">200</span><span class="n">200</span><span class="h">#DDD6FE</span></div>
    <div class="sw lite" style="background:#c4b5fd"><span class="key">300</span><span class="n">300</span><span class="h">#C4B5FD</span></div>
    <div class="sw dark" style="background:#a78bfa"><span class="key">400</span><span class="n">400</span><span class="h">#A78BFA</span></div>
    <div class="sw dark" style="background:#8b5cf6"><span class="star">★</span><span class="n">500</span><span class="h">#8B5CF6</span></div>
    <div class="sw dark" style="background:#7c3aed"><span class="key">600</span><span class="n">600</span><span class="h">#7C3AED</span></div>
    <div class="sw dark" style="background:#6d28d9"><span class="key">700</span><span class="n">700</span><span class="h">#6D28D9</span></div>
    <div class="sw dark" style="background:#5b21b6"><span class="key">800</span><span class="n">800</span><span class="h">#5B21B6</span></div>
  </div>
  <div style="margin-top: 14px; font-size: 11.5px; color: var(--fg-dim);">
    <span style="color:#fff; font-weight:600;">★ 500 (#8B5CF6)</span> is the brand primary — active rails, focus rings, gradient endpoints, play-button fill.
  </div>
</body></html>
