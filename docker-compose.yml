version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aurora-postgres
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: aurora
      POSTGRES_DB: aurora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: aurora-meilisearch
    environment:
      MEILI_MASTER_KEY: aurora-master-key
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  object-storage:
    build:
      context: ./nebula-os
      dockerfile: Dockerfile
    container_name: aurora-object-storage
    environment:
      NOS_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NOS_SIGNING_SECRET: ${SIGNING_SECRET:?SIGNING_SECRET must be set}
      NOS_BIND_ADDR: 0.0.0.0:9000
      NOS_DATA_DIR: /data/blobs
      NOS_META_PATH: /data/meta/metadata.db
      RUST_LOG: info
    ports:
      - "9000:9000"
    volumes:
      - nebula_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurora-backend
    environment:
      DATABASE_URL: postgres://aurora:aurora@postgres:5432/aurora
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: aurora-master-key
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      SIGNING_SECRET: ${SIGNING_SECRET:?SIGNING_SECRET must be set}
      URL_EXPIRY_SECONDS: 3600
      MUSIC_DIR: /music
      STORAGE_MODE: proxy
      OBJECT_STORAGE_URL: http://object-storage:9000
      OBJECT_STORAGE_BUCKET: music
      RUST_LOG: debug
    ports:
      - "3000:3000"
    volumes:
      - ./music:/music
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      object-storage:
        condition: service_started

volumes:
  postgres_data:
  meilisearch_data:
  nebula_data:
