<!doctype html>
<html><head><meta charset="utf-8"><title>Aurora · Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { height: 200px; }
  h4 { margin: 0 0 14px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); font-weight: 600;}
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .item { display:flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 76px; background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02)); border: 1px solid rgba(255,255,255,0.10); }
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg-dim); text-align: center; line-height: 1.3; }
  .lbl b { color: #fff; font-weight: 600; display: block; }
</style></head>
<body>
  <h4>Radii</h4>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: 6px"></div><div class="lbl"><b>sm</b>6px</div></div>
    <div class="item"><div class="box" style="border-radius: 8px"></div><div class="lbl"><b>md</b>8px</div></div>
    <div class="item"><div class="box" style="border-radius: 12px"></div><div class="lbl"><b>lg · xl</b>12 / inputs</div></div>
    <div class="item"><div class="box" style="border-radius: 16px"></div><div class="lbl"><b>2xl</b>16 / cards</div></div>
    <div class="item"><div class="box" style="border-radius: 24px"></div><div class="lbl"><b>3xl</b>24 / artwork</div></div>
    <div class="item"><div class="box" style="border-radius: 9999px"></div><div class="lbl"><b>pill</b>full</div></div>
  </div>
</body></html>
